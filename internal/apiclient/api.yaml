openapi: 3.0.0
info:
  title: Anthropic API
  version: 1.0.0
servers:
  - url: https://api.anthropic.com
    description: Anthropic API
    variables: {}
paths:
  /v1/organizations/users:
    get:
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: before_id
          in: query
          schema:
            type: string
        - name: after_id
          in: query
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                  - first_id
                  - last_id
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  has_more:
                    type: boolean
                  first_id:
                    type: string
                    nullable: true
                  last_id:
                    type: string
                    nullable: true
  /v1/organizations/users/{user_id}:
    get:
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /v1/organizations/invites:
    get:
      operationId: listInvites
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: before_id
          in: query
          schema:
            type: string
        - name: after_id
          in: query
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                  - first_id
                  - last_id
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invite"
                  has_more:
                    type: boolean
                  first_id:
                    type: string
                    nullable: true
                  last_id:
                    type: string
                    nullable: true
    post:
      operationId: createInvite
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                role:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
  /v1/organizations/invites/{invite_id}:
    get:
      operationId: getInvite
      parameters:
        - name: invite_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
    delete:
      operationId: deleteInvite
      parameters:
        - name: invite_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
  /v1/organizations/workspaces:
    get:
      operationId: listWorkspaces
      parameters:
        - name: include_archived
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: before_id
          in: query
          schema:
            type: string
        - name: after_id
          in: query
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                  - first_id
                  - last_id
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workspace"
                  has_more:
                    type: boolean
                  first_id:
                    type: string
                    nullable: true
                  last_id:
                    type: string
                    nullable: true
    post:
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /v1/organizations/workspaces/{workspace_id}:
    get:
      operationId: getWorkspace
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    post:
      operationId: updateWorkspace
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /v1/organizations/workspaces/{workspace_id}/archive:
    post:
      operationId: archiveWorkspace
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /v1/organizations/workspaces/{workspace_id}/members:
    get:
      operationId: listWorkspaceMembers
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: before_id
          in: query
          schema:
            type: string
        - name: after_id
          in: query
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                  - first_id
                  - last_id
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceMember"
                  has_more:
                    type: boolean
                  first_id:
                    type: string
                    nullable: true
                  last_id:
                    type: string
                    nullable: true
    post:
      operationId: createWorkspaceMember
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - workspace_role
              properties:
                user_id:
                  type: string
                workspace_role:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  # ==================== Managed Agents API ====================
  /v1/agents:
    get:
      operationId: listAgents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
                  next_page:
                    type: string
                    nullable: true
    post:
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
  /v1/agents/{agent_id}:
    get:
      operationId: getAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    post:
      operationId: updateAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResource"
  /v1/environments:
    get:
      operationId: listEnvironments
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Environment"
                  next_page:
                    type: string
                    nullable: true
    post:
      operationId: createEnvironment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
  /v1/environments/{environment_id}:
    get:
      operationId: getEnvironment
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    post:
      operationId: updateEnvironment
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnvironmentRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    delete:
      operationId: deleteEnvironment
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResource"
  # ==================== End Managed Agents API ====================
  /v1/organizations/workspaces/{workspace_id}/members/{user_id}:
    get:
      operationId: getWorkspaceMember
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
    post:
      operationId: updateWorkspaceMember
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - workspace_role
              properties:
                workspace_role:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
    delete:
      operationId: deleteWorkspaceMember
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
security:
  - apiKeyAuth: []
  - versionHeader: []
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    versionHeader:
      type: apiKey
      in: header
      name: anthropic-version
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - type
            - message
          properties:
            type:
              type: string
            message:
              type: string
    Invite:
      type: object
      required:
        - id
        - email
        - role
        - status
        - created_at
        - expires_at
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        created_at:
          type: string
        expires_at:
          type: string
    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - added_at
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        added_at:
          type: string
    Workspace:
      type: object
      required:
        - id
        - name
        - created_at
        - archived_at
        - display_color
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
        archived_at:
          type: string
          nullable: true
        display_color:
          type: string
    WorkspaceMember:
      type: object
      required:
        - user_id
        - workspace_id
        - workspace_role
      properties:
        user_id:
          type: string
        workspace_id:
          type: string
        workspace_role:
          type: string
    # ==================== Managed Agents Schemas ====================
    AgentModelConfig:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        speed:
          type: string
    AgentSkill:
      type: object
      required:
        - skill_id
        - type
        - version
      properties:
        skill_id:
          type: string
        type:
          type: string
        version:
          type: string
    AgentSkillRequest:
      type: object
      required:
        - skill_id
        - type
        - version
      properties:
        skill_id:
          type: string
        type:
          type: string
        version:
          type: string
    AgentToolPermissionPolicy:
      type: object
      required:
        - type
      properties:
        type:
          type: string
    AgentToolDefaultConfig:
      type: object
      properties:
        enabled:
          type: boolean
        permission_policy:
          $ref: "#/components/schemas/AgentToolPermissionPolicy"
    AgentTool:
      type: object
      required:
        - type
      properties:
        type:
          type: string
        mcp_server_name:
          type: string
        default_config:
          $ref: "#/components/schemas/AgentToolDefaultConfig"
        configs:
          type: array
          items:
            type: object
            additionalProperties: true
    AgentMcpServer:
      type: object
      required:
        - name
        - type
        - url
      properties:
        name:
          type: string
        type:
          type: string
        url:
          type: string
    Agent:
      type: object
      required:
        - id
        - type
        - version
        - name
      properties:
        id:
          type: string
        type:
          type: string
        version:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        model:
          $ref: "#/components/schemas/AgentModelConfig"
        system:
          type: string
          nullable: true
        status:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        archived_at:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkill"
        tools:
          type: array
          items:
            $ref: "#/components/schemas/AgentTool"
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/AgentMcpServer"
    CreateAgentRequest:
      type: object
      required:
        - name
        - model
      properties:
        name:
          type: string
        description:
          type: string
        model:
          type: string
        system:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        tools:
          type: array
          items:
            $ref: "#/components/schemas/AgentTool"
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/AgentMcpServer"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkillRequest"
    UpdateAgentRequest:
      type: object
      required:
        - version
      properties:
        version:
          type: string
        name:
          type: string
        description:
          type: string
        model:
          type: string
        system:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        tools:
          type: array
          items:
            $ref: "#/components/schemas/AgentTool"
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/AgentMcpServer"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkillRequest"
    EnvironmentNetworking:
      type: object
      required:
        - type
      properties:
        type:
          type: string
        allow_mcp_servers:
          type: boolean
        allow_package_managers:
          type: boolean
        allowed_hosts:
          type: array
          items:
            type: string
    EnvironmentPackages:
      type: object
      required:
        - type
      properties:
        type:
          type: string
        apt:
          type: array
          items:
            type: string
        pip:
          type: array
          items:
            type: string
        npm:
          type: array
          items:
            type: string
        cargo:
          type: array
          items:
            type: string
        gem:
          type: array
          items:
            type: string
        go:
          type: array
          items:
            type: string
    EnvironmentConfig:
      type: object
      required:
        - type
        - networking
      properties:
        type:
          type: string
        networking:
          $ref: "#/components/schemas/EnvironmentNetworking"
        packages:
          $ref: "#/components/schemas/EnvironmentPackages"
        init_script:
          description: |
            Read-only. Currently returned by GET but rejected on POST/PATCH.
          type: string
        environment:
          description: |
            Read-only. Currently returned by GET but rejected on POST/PATCH.
          type: object
          additionalProperties:
            type: string
    Environment:
      type: object
      required:
        - id
        - type
        - name
        - config
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        config:
          $ref: "#/components/schemas/EnvironmentConfig"
        created_at:
          type: string
        updated_at:
          type: string
    CreateEnvironmentRequest:
      type: object
      required:
        - name
        - config
      properties:
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        config:
          $ref: "#/components/schemas/EnvironmentConfig"
    UpdateEnvironmentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        config:
          $ref: "#/components/schemas/EnvironmentConfig"
    DeletedResource:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
        type:
          type: string
